<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OMR Capture</title>

<style>
:root{
  --w:340px;
  --red:#ff2d2d;
  --green:#1fbf4c;
  --muted:#555;
}

body{
  font-family:Arial,sans-serif;
  margin:20px;
}

#wrap{
  position:relative;
  width:var(--w);
  max-width:100%;
}

#video{
  width:100%;
  display:block;
  border-radius:8px;
  background:#000;
}

#box{
  position:absolute;
  border:3px solid var(--red);
  border-radius:8px;
  pointer-events:none;
  transition:border-color 140ms ease;
}

#box.detected{
  border-color:var(--green);
}

#status{
  margin-top:8px;
  min-height:22px;
  color:var(--muted);
  font-size:18px;
}

#controls{
  margin-top:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

button{
  padding:8px 12px;
  border:1px solid #ccc;
  background:#fff;
  border-radius:6px;
  cursor:pointer;
}

#captureBtn:disabled,
#captureEditBtn:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

.output-grid.hidden{
  display:none;
}

.output-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:12px;
  margin-top:14px;
  max-width:1000px;
}

.output-card img{
  width:100%;
  max-width:var(--w);
  border:1px solid #ddd;
  border-radius:6px;
  display:block;
  margin-top:6px;
  background:#f7f7f7;
  min-height:120px;
  object-fit:contain;
}

#editorModal.hidden{
  display:none;
}

#editorModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.72);
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

#editorCard{
  background:#fff;
  border-radius:8px;
  width:min(95vw,560px);
  padding:10px;
}

#editorCanvas{
  width:100%;
  display:block;
  border:1px solid #ddd;
  border-radius:6px;
  touch-action:none;
  background:#111;
  cursor:crosshair;
}

#editorActions{
  display:flex;
  gap:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<h3>Document Scanner (OMR Sheet)</h3>

<div id="wrap">
<video id="video" autoplay playsinline></video>
<div id="box"></div>
</div>

<div id="status">Searching for document inside red box…</div>

<div id="controls">
<button id="captureBtn" onclick="capture(false)" disabled>Capture</button>
<button id="captureEditBtn" onclick="capture(true)" disabled>Capture + Edit</button>
<button onclick="capture(false,true)">Capture Anyway</button>
<input id="uploadInput" type="file" accept="image/*">
</div>

<canvas id="canvas" style="display:none"></canvas>

<div id="outputSection" class="output-grid hidden">

<div class="output-card">
Detected Sheet
<img id="capturedResult">
</div>

<div class="output-card">
Edge Detection
<img id="pipelineResult">
</div>

<div class="output-card">
Grayscale
<img id="biggestRectResult">
</div>

<div class="output-card">
Final Cropped
<img id="croppedResult">
</div>

</div>

<div id="editorModal" class="hidden">
<div id="editorCard">

<div>Drag the 4 red dots then press Apply</div>

<canvas id="editorCanvas"></canvas>

<div id="editorActions">
<button onclick="cancelEditor()">Cancel</button>
<button onclick="applyManualCrop()">Apply</button>
</div>

</div>
</div>

<script>

const video=document.getElementById("video");
const box=document.getElementById("box");
const canvas=document.getElementById("canvas");
const statusText=document.getElementById("status");

async function startCamera(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

video.srcObject=stream;

}catch(e){

statusText.innerText="Camera permission required";

}

}

function capture(){

const ctx=canvas.getContext("2d");

canvas.width=video.videoWidth;
canvas.height=video.videoHeight;

ctx.drawImage(video,0,0);

const data=canvas.toDataURL("image/jpeg",0.9);

fetch("/process",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({img:data})
})
.then(r=>r.json())
.then(d=>{

document.getElementById("capturedResult").src=d.captured_image
document.getElementById("pipelineResult").src=d.pipeline_image
document.getElementById("biggestRectResult").src=d.biggest_rect_image
document.getElementById("croppedResult").src=d.cropped_image

document.getElementById("outputSection").classList.remove("hidden")

})

}

startCamera()

</script>

</body>
</html>
